services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_ai_pro
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_ai_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_HOST: postgres
      DB_NAME: crm_ai_pro
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost
      ALLOWED_HOSTS: localhost,backend,127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn crm_ai_pro.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_HOST: postgres
      DB_NAME: crm_ai_pro
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
    command: celery -A crm_ai_pro worker -l info

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_HOST: postgres
      DB_NAME: crm_ai_pro
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - backend
    command: celery -A crm_ai_pro beat -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_data:
